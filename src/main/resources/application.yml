# Quarkus configuration
quarkus:
  datasource: # Database datasource configuration
    db-kind: postgresql # Database type
    username: postgres # Database username
    password: ${POSTGRES_DOCKER_PASSWORD:postgres} # Database password (override with POSTGRES_DOCKER_PASSWORD env var)
    devservices: # Development services configuration
      enabled: false # Disable automatic database provisioning in dev mode
    reactive: # Reactive PostgreSQL client configuration
      url: postgresql://localhost:5432/quarkus-reactive-postgres # Database connection URL
      max-size: 20 # Maximum number of database connections
      connection-timeout: 5S # Maximum time to wait for a connection from the pool
      idle-timeout: 60S # Time before an idle connection is closed
      pool-cleaner-interval: 10S # Interval for the pool cleaner to run
  log: # Logging configuration
    min-level: DEBUG # Minimum log level
    console: # Console logging configuration
      json: true # Enable JSON logging to console (MDC fields auto-included)
  context-propagation: # Context propagation for async operations
    propagated-types: # MDC keys to propagate across threads
      - org.jboss.logmanager.MDC
  http: # HTTP server configuration
    port: 8181 # Server port
    auth:
      proactive: false # Let JAX-RS handle auth exceptions (enables JSON error responses)
      permission:
        # Allow health, dev, and auth paths without auth
        /q/*: permit
        /health/*: permit
        /auth/*: permit
        # Require authentication for all API paths
        /fruits/*: authenticated
        /employees/*: authenticated
  oidc: # OIDC/OAuth2 configuration (Keycloak)
    auth-server-url: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:quarkus} # Keycloak realm URL
    client-id: ${KEYCLOAK_CLIENT_ID:quarkus-app} # OAuth2 client ID
    credentials:
      secret: ${KEYCLOAK_CLIENT_SECRET:secret} # OAuth2 client secret
    application-type: service # Service-to-service app (validates JWT tokens)
    token:
      audience: account # Accept tokens with 'account' audience (Keycloak password grant default)
    token-state-manager:
      encryption-required: false # Disable encryption for dev mode

# Keycloak Admin API configuration (for user registration)
keycloak:
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME:admin} # Keycloak admin username
    password: ${KEYCLOAK_ADMIN_PASSWORD:change_me} # Keycloak admin password

# Vert.x WebClient configuration
webclient:
  max-pool-size: 20 # Maximum number of HTTP connections in the pool
  connect-timeout: 5000 # Connection timeout in milliseconds
  idle-timeout: 60000 # Idle connection timeout in milliseconds (close idle connections after this time)
  max-wait-queue-size: 5000 # Maximum number of requests waiting for a connection

# Fruit scheduler configuration
fruit:
  scheduler: # Scheduler configuration
    interval: 1m # Scheduler interval expression (e.g., 1m, 5m, 1h)
    min-insert: 10 # Minimum number of fruits to insert per run (minimum value is 3)
    enabled: true # Enable or disable the scheduler
    api-url: https://www.fruityvice.com/api/fruit/all # URL of the fruit API endpoint
